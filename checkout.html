<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lylo Candles - Checkout</title>

<style>
:root {
  --bg-white: #FFFFFF;
  --bg-dark: #2E3036;
  --text-dark: #1C1C1E;
  --text-muted: #6B6E76;
  --btn-dark: #1C1C1E;
  --btn-hover: #111111;
  --btn-disabled: #999999;
  --accent: #ad9060ad;
  --highlight: #d9b382;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background: var(--bg-white); color: var(--text-dark); }

nav { padding:20px 8%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #E3E3E3; position:relative; }
nav h1 { letter-spacing:3px; font-weight:600; font-size:1.4rem; }
nav a { text-decoration:none; color: var(--text-muted); transition:0.15s; margin-left:25px; }
nav a:hover { color: var(--text-dark); }

.hamburger { display:none; flex-direction:column; cursor:pointer; gap:4px; }
.hamburger div { width:25px; height:3px; background:var(--text-dark); border-radius:2px; transition:0.3s; }

.mobile-menu { 
  display:none; 
  position:absolute; 
  top:70px; 
  right:8%; 
  background:#fff; 
  box-shadow:0 5px 15px rgba(0,0,0,0.1); 
  border-radius:8px; 
  flex-direction:column; 
  padding:10px; 
}
.mobile-menu.show { display:flex; }
.mobile-menu a { margin:10px 0; color:var(--text-dark); }

main { max-width:720px; margin:40px auto 80px auto; padding:0 20px; }

#back-shop { margin-bottom:20px; display:inline-block; text-decoration:none; color:var(--btn-dark); font-weight:600; border:1px solid var(--btn-dark); padding:8px 16px; border-radius:6px; transition:all 0.2s; }
#back-shop:hover { background: var(--btn-dark); color: var(--bg-white); transform: scale(1.05); }

h1 { margin-bottom:30px; font-size:2rem; text-align:center; }

#cart-container { display:flex; flex-direction:column; gap:15px; }

.cart-item { display:flex; justify-content:space-between; align-items:center; padding:15px; border-radius:12px; background:#F5F0EC; box-shadow:0 5px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
.cart-item:hover { transform: translateY(-3px) scale(1.01); box-shadow:0 10px 25px rgba(0,0,0,0.1); }

.qty-controls { display:flex; align-items:center; gap:6px; }
.qty-controls button { padding:2px 10px; border:none; background: var(--accent); color:#fff; font-weight:600; border-radius:4px; cursor:pointer; }
.remove-btn { background:#e74c3c; border:none; color:#fff; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.8rem; }

#summary {
  margin-top:30px;
  padding:20px;
  background:#F8F6F3;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

#summary div {
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

#summary .total {
  font-size:1.2rem;
  font-weight:600;
  margin-top:15px;
  padding-top:10px;
  border-top:1px solid #ddd;
}

.free-ship-msg {
  font-size:0.85rem;
  color:var(--text-muted);
  margin-top:8px;
}

.secure-checkout {
  text-align:center;
  font-size:0.9rem;
  margin-top:15px;
  color:var(--text-muted);
}

#paypal-button-container { display:flex; justify-content:center; margin-top:15px; }

footer { padding:50px 8%; color: var(--text-muted); font-size:0.9rem; border-top:1px solid #E3E3E3; text-align:center; margin-top:50px; }

@media(max-width:768px){
  nav a { display:none; }
  .hamburger { display:flex; }
}
</style>
</head>

<body>

<nav>
  <h1>LYLO CANDLES</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="request.html">Request</a>
  </div>
  <div class="hamburger" id="hamburger">
    <div></div><div></div><div></div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="request.html">Request</a>
  </div>
</nav>

<main>
  <a id="back-shop" href="products.html">Back to Shop</a>
  <h1>Your Cart</h1>

  <div id="cart-container"></div>

  <div id="summary">
    <div>Subtotal <span id="subtotal">$0.00</span></div>
    <div>Tax <span id="tax">$0.00</span></div>
    <div>Delivery <span id="delivery">$0.00</span></div>
    <div class="total">Total <span id="total">$0.00</span></div>
    <div class="free-ship-msg" id="freeShipMsg"></div>
  </div>
  
  <div id="paypal-button-container"></div>
</main>

<footer>© 2026 Lylo Candles. All rights reserved.</footer>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=AeOPCFJ7CizEb34UzetT2IZW7FguEdeFmBuh0y_c4vKxK6Gredn-5dv3qlfks-i9Q8LNGZtT_hoyrMR8&currency=USD"></script>

<script>
let cart = JSON.parse(localStorage.getItem('lyloCart')) || [];
let taxRate = 0.05;

const cartContainer = document.getElementById('cart-container');
const subtotalEl = document.getElementById('subtotal');
const taxEl = document.getElementById('tax');
const deliveryEl = document.getElementById('delivery');
const totalEl = document.getElementById('total');
const freeShipMsg = document.getElementById('freeShipMsg');
const paypalContainer = document.getElementById('paypal-button-container');

document.getElementById('hamburger')
  .addEventListener('click', ()=> document.getElementById('mobileMenu').classList.toggle('show'));

async function detectLocationTax(){
  try{
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    if(data.country_code==="CA"){
      if(data.region==="Ontario") taxRate=0.13;
      else if(data.region==="Quebec") taxRate=0.14975;
      else taxRate=0.05;
    }
    else if(data.country_code==="US"){ taxRate=0.07; }
    else { taxRate=0; }
  }catch(e){ console.log("Tax detect failed"); }
}

function saveCart(){ localStorage.setItem('lyloCart', JSON.stringify(cart)); }

function animateNumber(el,start,end,duration=400){
  let startTime=null;
  function animate(currentTime){
    if(!startTime) startTime=currentTime;
    let progress=currentTime-startTime;
    let value=Math.min(start+(end-start)*(progress/duration),end);
    el.innerText="$"+value.toFixed(2);
    if(progress<duration){ requestAnimationFrame(animate); }
  }
  requestAnimationFrame(animate);
}

function renderCart(){
  cartContainer.innerHTML='';
  if(cart.length===0){
    cartContainer.innerHTML='<p style="color:#999;text-align:center;">Your cart is empty.</p>';
    subtotalEl.innerText="$0.00";
    taxEl.innerText="$0.00";
    deliveryEl.innerText="$0.00";
    totalEl.innerText="$0.00";
    freeShipMsg.innerText="";
    paypalContainer.style.display='none';
    return;
  }

  let subtotal=0;

  cart.forEach((item,index)=>{
    subtotal += item.price*(item.qty||1);
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      <h3>${item.title}</h3>
      <div class="qty-controls">
        <button class="minus">-</button>
        <span>${item.qty||1}</span>
        <button class="plus">+</button>
      </div>
      <p>$${(item.price*(item.qty||1)).toFixed(2)}</p>
      <button class="remove-btn">Remove</button>
    `;
    div.querySelector('.plus').onclick=()=>{ item.qty=(item.qty||1)+1; saveCart(); renderCart(); };
    div.querySelector('.minus').onclick=()=>{ if((item.qty||1)>1){ item.qty-=1 } else { cart.splice(index,1); } saveCart(); renderCart(); };
    div.querySelector('.remove-btn').onclick=()=>{ cart.splice(index,1); saveCart(); renderCart(); };
    cartContainer.appendChild(div);
  });

  let tax = subtotal*taxRate;
  let delivery = subtotal>=50?0:3;
  let total = subtotal+tax+delivery;

  animateNumber(subtotalEl,0,subtotal);
  animateNumber(taxEl,0,tax);
  animateNumber(totalEl,0,total);

  deliveryEl.innerText = delivery===0?"FREE":"$"+delivery.toFixed(2);

  if(subtotal<50){
    freeShipMsg.innerText=`You're $${(50-subtotal).toFixed(2)} away from free shipping.`;
  } else {
    freeShipMsg.innerText="You unlocked FREE shipping 🎉";
  }

  renderPayPal(total);
}

function renderPayPal(total){
  paypalContainer.innerHTML = '';
  paypalContainer.style.display = 'flex';

  paypal.Buttons({

    style: {
      layout: 'vertical',
      color: 'blue',      // gold | blue | silver | black | white
      shape: 'rect',       // rect | pill
      height: 50,
      label: 'checkout'    // paypal | checkout | pay | buynow
    },

    createOrder: (data, actions) => {
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: total.toFixed(2)
          }
        }]
      });
    },

    onApprove: (data, actions) => {
      return actions.order.capture().then(details => {
        confetti({
          particleCount: 60,
          spread: 90,
          origin: { y: 0.6 }
        });

        alert(`Payment successful! Thank you, ${details.payer.name.given_name}`);

        cart = [];
        saveCart();
        renderCart();
      });
    },

    onCancel: () => {
      alert("Payment cancelled.");
    },

    onError: (err) => {
      console.error(err);
      alert("Something went wrong with the payment.");
    }

  }).render('#paypal-button-container');
}

detectLocationTax().then(()=> renderCart());
</script>

</body>
</html>
